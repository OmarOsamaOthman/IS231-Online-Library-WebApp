<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Add-book-styling.css">
    <link rel="icon" type="image/png" href="add-book.png">
    <title>Add Book</title>
</head>

<body>
    <div class="navbar">
        <div class="logo">
            <a href="#"><img src="book-logo.png" alt="logo of"> <span>Online Library</span> </a>
        </div>

        <nav>
            <ul>
                <li><a href="library.html">Home</a></li>
                <li><a href="books.html">Books</a></li>
                <li><a href="Add-book.html">Add Book</a></li>
                <li><a href="#">Borrowed</a></li>
            </ul>
        </nav>
    </div>

    <header>
        <h1>Add New Book</h1>
    </header>

    <main>
        <form method="get" action="">
            <div>
                <label for="book-title">Book Title:</label>
                <input type="text" id="book-title" name="book_title" required autofocus>
            </div>
            <div>
                <label for="author">Author:</label>
                <input type="text" id="author" name="author" required>
            </div>

            <div>
                <label for="category">Category:</label>
                <select id="category" name="category">
                    <option value="" selected>Choose Category</option>
                    <option value="fiction">Fiction</option>
                    <option value="science">Science</option>
                    <option value="history">History</option>
                    <option value="technology">Technology</option>
                    <option value="education">Education</option>
                    <option value="biography">Biography</option>
                </select>
            </div>
            <div>
                <label for="description">Description:</label>
                <textarea id="description" name="description"></textarea>

            </div>
            <div>
                <label for="status">Status:</label>
                <select id="status" name="status">
                    <option value="available" selected>Available</option>
                    <option value="borrowed">Borrowed</option>
                    <option value="out of stock">Out of stock</option>
                    <option value="maintenance">Maintenance</option>
                </select>
            </div>

            <div class="image">
                <label for="book-image">Upload Book Image:
                    <!-- <img src="upload-image.png" alt=""> -->
                </label>
                <input type="file" id="book-image" accept="image/*">
            </div>


            <button>Add Book</button>
            <button>Cancel</button>
        </form>

    </main>
    <footer>
        <p>© 2026 Online Library. All Rights Reserved. | Developed by Omar Osama</p>
    </footer>
</body>

</html>
